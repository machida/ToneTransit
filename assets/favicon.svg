<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="ToneTransit">
  <rect width="32" height="32" rx="7" fill="#0f172a"/>
  <!-- strings -->
  <g stroke="#f1f5f9" stroke-opacity="0.22" stroke-width="1">
    <line x1="6" y1="11" x2="26" y2="11"/>
    <line x1="6" y1="16" x2="26" y2="16"/>
    <line x1="6" y1="21" x2="26" y2="21"/>
  </g>
  <!-- nut + frets -->
  <line x1="9" y1="7" x2="9" y2="25" stroke="#f1f5f9" stroke-width="2"/>
  <line x1="16" y1="7" x2="16" y2="25" stroke="#f1f5f9" stroke-opacity="0.22" stroke-width="1"/>
  <line x1="23" y1="7" x2="23" y2="25" stroke="#f1f5f9" stroke-opacity="0.22" stroke-width="1"/>
  <!-- scale note (outline) -->
  <circle cx="12.5" cy="21" r="3.1" fill="#0f172a" stroke="#f1f5f9" stroke-width="1.4"/>
  <!-- chord tone (violet accent) -->
  <circle cx="19.5" cy="11" r="3.6" fill="#7c3aed"/>
</svg>
