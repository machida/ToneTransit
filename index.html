<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToneTransit</title>
  <meta name="description" content="スケールの各音が「今のコード」に対して何度かを指板上で可視化する、ギタリストのための練習ツール">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="apple-touch-icon" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/print.css" media="print">
</head>
<body>
  <header class="tt-header">
    <div class="tt-brand">
      <div class="tt-brand-text">
        <h1>Tone<span class="tt-accent">Transit</span></h1>
      </div>
      <div class="tt-header-actions">
        <div class="tt-header-setting" aria-label="テーマ">
          <span class="tt-header-setting-label" data-i18n="tool.theme">テーマ</span>
          <div class="tt-segments" role="radiogroup" aria-label="テーマ">
            <label class="tt-segment"><input type="radio" name="theme" value="auto"><span data-i18n="tool.theme.auto">自動</span></label>
            <label class="tt-segment"><input type="radio" name="theme" value="light"><span data-i18n="tool.theme.light">ライト</span></label>
            <label class="tt-segment"><input type="radio" name="theme" value="dark"><span data-i18n="tool.theme.dark">ダーク</span></label>
          </div>
        </div>
        <div class="tt-header-lang" aria-label="言語">
          <span class="tt-header-setting-label" data-i18n="app.lang">言語</span>
          <div class="tt-segments" role="radiogroup" aria-label="言語">
            <label class="tt-segment"><input type="radio" name="lang" value="ja">日本語</label>
            <label class="tt-segment"><input type="radio" name="lang" value="en">EN</label>
          </div>
        </div>
        <button type="button" id="tourBtn" class="tt-help-btn" data-i18n="app.help">？ 使い方</button>
      </div>
    </div>
  </header>

  <main class="tt-main">
    <section class="tt-controls" aria-label="設定">
      <section class="tt-group">
        <div class="tt-group-head">
          <h3 class="tt-group-title" data-i18n="scale.heading">スケール</h3>
          <label class="tt-switch">
            <span class="tt-switch-label" data-i18n="scale.show">表示</span>
            <input type="checkbox" id="scaleToggle" class="tt-switch-input" role="switch"
                   checked data-i18n-aria="scale.showAria" aria-label="スケールを表示（オフでコードトーンのみ）">
            <span class="tt-switch-track" aria-hidden="true"><span class="tt-switch-thumb"></span></span>
          </label>
        </div>
        <div class="tt-group-body">
          <div class="tt-field" id="scaleRootField">
            <label for="scaleRoot" data-i18n="scale.root">ルート</label>
            <select id="scaleRoot"></select>
          </div>
          <div class="tt-field tt-field--grow">
            <label for="scaleSearch" data-i18n="scale.label">スケール</label>
            <div class="tt-combo" id="scaleCombo">
              <input type="text" id="scaleSearch" class="tt-combo-input" role="combobox"
                     aria-expanded="false" aria-controls="scaleList" aria-autocomplete="list"
                     autocomplete="off" spellcheck="false"
                     data-i18n-ph="scale.search.ph" placeholder="検索（例: ドリアン / lydian）">
              <ul class="tt-combo-list" id="scaleList" role="listbox" hidden></ul>
            </div>
          </div>
          <p class="tt-hint" id="scaleHint" hidden data-i18n="scale.hint">スケールなし：音名の綴りはコードのルート基準で表示します。</p>
          <div class="tt-notes" id="scaleNotes" aria-label="スケール構成音"></div>
          <p class="tt-desc" id="scaleDesc"></p>
        </div>
      </section>

      <section class="tt-group">
        <div class="tt-group-head">
          <h3 class="tt-group-title" data-i18n="chord.heading">コード</h3>
          <label class="tt-switch">
            <span class="tt-switch-label" data-i18n="chord.show">表示</span>
            <input type="checkbox" id="chordToggle" class="tt-switch-input" role="switch"
                   checked data-i18n-aria="chord.showAria" aria-label="コードを表示（オフでスケールのみ）">
            <span class="tt-switch-track" aria-hidden="true"><span class="tt-switch-thumb"></span></span>
          </label>
        </div>
        <div class="tt-group-body">
          <div class="tt-field" id="chordRootField">
            <label for="chordRoot" data-i18n="chord.root">コードルート</label>
            <select id="chordRoot"></select>
          </div>
          <div class="tt-field tt-field--grow" id="chordTypeField">
            <label for="chord" data-i18n="chord.type">種類</label>
            <select id="chord"></select>
          </div>
          <div class="tt-reco" id="chordReco" aria-label="おすすめコード"></div>
          <div class="tt-notes" id="chordNotes" aria-label="コード構成音"></div>
          <p class="tt-desc" id="chordDesc"></p>
        </div>
      </section>

      <section class="tt-group" id="auditionCard">
        <div class="tt-group-head"><h3 class="tt-group-title" data-i18n="audition.heading">試聴</h3></div>
        <div class="tt-group-body">
          <div class="tt-field tt-field--grow">
            <label for="auTimbreScale" data-i18n="audition.scaleTimbre">スケールの音色</label>
            <select id="auTimbreScale">
              <option value="piano" data-i18n="timbre.piano">ピアノ</option>
              <option value="epiano" data-i18n="timbre.epiano">エレピ</option>
              <option value="organ" data-i18n="timbre.organ">オルガン</option>
              <option value="simple" data-i18n="timbre.simple">シンプル（合成）</option>
            </select>
          </div>
          <div class="tt-field">
            <span class="tt-field-label" data-i18n="audition.octave">オクターブ</span>
            <div class="tt-segments" role="radiogroup" aria-label="スケールのオクターブ">
              <label class="tt-segment"><input type="radio" name="scaleOctave" value="3">3</label>
              <label class="tt-segment"><input type="radio" name="scaleOctave" value="4">4</label>
              <label class="tt-segment"><input type="radio" name="scaleOctave" value="5">5</label>
            </div>
          </div>
          <div class="tt-field tt-field--grow">
            <label for="auTimbreChord" data-i18n="audition.chordTimbre">コードの音色</label>
            <select id="auTimbreChord">
              <option value="piano" data-i18n="timbre.piano">ピアノ</option>
              <option value="epiano" data-i18n="timbre.epiano">エレピ</option>
              <option value="organ" data-i18n="timbre.organ">オルガン</option>
              <option value="simple" data-i18n="timbre.simple">シンプル（合成）</option>
            </select>
          </div>
          <div class="tt-field">
            <span class="tt-field-label" data-i18n="audition.octave">オクターブ</span>
            <div class="tt-segments" role="radiogroup" aria-label="コードのオクターブ">
              <label class="tt-segment"><input type="radio" name="chordOctave" value="3">3</label>
              <label class="tt-segment"><input type="radio" name="chordOctave" value="4">4</label>
              <label class="tt-segment"><input type="radio" name="chordOctave" value="5">5</label>
            </div>
          </div>
          <div class="tt-au-buttons">
            <button type="button" class="tt-au-play" id="auPlayScale"><span data-i18n="audition.playScale">スケール</span></button>
            <button type="button" class="tt-au-play" id="auPlayChord"><span data-i18n="audition.playChord">コード</span></button>
            <button type="button" class="tt-au-play tt-au-play--mix" id="auPlayMix"><span data-i18n="audition.playMix">ミックス</span></button>
          </div>
        </div>
      </section>

    </section>

    <p id="dataError" class="tt-error" hidden></p>

    <!-- Toolbar above the preview: display options (left) + actions (right) -->
    <div class="tt-preview-bar">
      <div class="tt-preview-bar__left">
        <div class="tt-tool">
          <span class="tt-tool-label" data-i18n="tool.notation">表記</span>
          <div class="tt-segments" role="radiogroup" aria-label="音符の表記">
            <label class="tt-segment"><input type="radio" name="displayMode" value="name"><span data-i18n="tool.notation.name">音名</span></label>
            <label class="tt-segment"><input type="radio" name="displayMode" value="degree"><span data-i18n="tool.notation.degree">度数</span></label>
            <label class="tt-segment"><input type="radio" name="displayMode" value="name-degree"><span data-i18n="tool.notation.nameDegree">音名＋度数</span></label>
          </div>
        </div>
        <div class="tt-tool">
          <span class="tt-tool-label" data-i18n="tool.fretRange">フレット範囲</span>
          <div class="tt-range-inputs">
            <input type="number" id="fretStart" min="0" max="24" inputmode="numeric" aria-label="開始フレット">
            <span aria-hidden="true">–</span>
            <input type="number" id="fretEnd" min="0" max="24" inputmode="numeric" aria-label="終了フレット">
          </div>
        </div>
        <div class="tt-tool">
          <span class="tt-tool-label" data-i18n="tool.palette">配色</span>
          <div class="tt-segments" role="radiogroup" aria-label="配色">
            <label class="tt-segment"><input type="radio" name="palette" value="color"><span data-i18n="tool.palette.color">カラー</span></label>
            <label class="tt-segment"><input type="radio" name="palette" value="mono"><span data-i18n="tool.palette.mono">モノトーン</span></label>
          </div>
        </div>
      </div>
      <div class="tt-preview-bar__right">
        <button type="button" id="imgBtn" class="tt-btn tt-btn--ghost" data-i18n="action.image">画像を保存</button>
        <button type="button" id="printBtn" class="tt-btn" data-i18n="action.print">印刷 / PDF</button>
        <button type="button" id="shareBtn" class="tt-btn tt-btn--ghost" data-i18n="action.share">リンクをコピー</button>
      </div>
    </div>

    <!-- Printable single sheet (also the on-screen diagram) -->
    <section class="tt-sheet tt-sheet--main">
      <h2 class="tt-sheet-title" id="sheetTitle"></h2>
      <p class="tt-summary" id="summary"></p>
      <div class="tt-board" id="board"></div>

      <p class="tt-legend-guide"><span data-i18n="legend.guide">四角＝ルート、リング付き＝コードの要(3rd/7th)、青＝コードの音、薄色＝スケールの音。</span></p>
      <div class="tt-legend" aria-label="凡例">
        <span class="tt-legend-item" title="スケール／コードの基準音。すべての度数はここを 1 として数える"><span class="tt-swatch tt-swatch--root"></span><span data-i18n="legend.root">ルート (1)</span></span>
        <span class="tt-legend-item" title="コードの 3rd と 7th。コードの明暗・機能を決める最重要音"><span class="tt-swatch tt-swatch--guide"></span><span data-i18n="legend.guideTone">ガイドトーン (3rd / 7th)</span></span>
        <span class="tt-legend-item" title="今のコードの構成音"><span class="tt-swatch tt-swatch--chordtone"></span><span data-i18n="legend.chordTone">コードトーン</span></span>
        <span class="tt-legend-item" title="コードには含まれないがスケール上にある音（テンション＝緊張色）"><span class="tt-swatch tt-swatch--scale"></span><span data-i18n="legend.scale">スケール音 / テンション</span></span>
        <span class="tt-legend-item" title="コードの構成音だがスケールに無い＝スケールとコードが噛み合っていない音"><span class="tt-swatch tt-swatch--out"></span><span data-i18n="legend.out">コードトーン（スケール外）</span></span>
      </div>

      <div class="tt-sheet-info" id="sheetInfo"></div>
    </section>
  </main>

  <div id="toast" class="tt-toast" role="status" aria-live="polite"></div>

  <script src="js/music-theory.js"></script>
  <script src="js/fretboard.js"></script>
  <script src="js/renderer.js"></script>
  <!-- WebAudioFont player + bundled instrument samples (acoustic grand / Rhodes / organ) -->
  <script src="assets/sound/WebAudioFontPlayer.js"></script>
  <script src="assets/sound/0000_piano.js"></script>
  <script src="assets/sound/0040_epiano.js"></script>
  <script src="assets/sound/0160_organ.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/presets.js"></script>
  <script src="js/summary.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
